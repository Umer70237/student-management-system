<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test</title>

    <style>
      li{
        display: flex;
      }

      li h2{
        margin-left: 30px;
      }
      .container{
        display: flex;
        gap: 30px;
        margin-left: 30px;
      }

      li .edit_btn{
          margin: 30px;

      }
      li .del_btn{
        margin: 30px 10px;
      }


      
    </style>
  </head>
  <body>
    <!-- student-management-system -->
    <main>
      <section>
        <div>
          <label for="studentInput">Name</label>
          <input type="text" id="studentInput" placeholder="write your name" />
        </div>

        <div>
          <label for="fatherInput">Father Name</label>
          <input
            type="text"
            id="fatherInput"
            placeholder="write your father name"
          />
        </div>

        <button id="submitBtn">Add</button>
      </section>

      <section style="display: flex; gap: 30px">
        <div>
          <ul id="studentList"></ul>
        </div>
      </section>
    </main>

    <script>
      const studentInput = document.getElementById("studentInput");
      const fatherInput = document.getElementById("fatherInput");
      const submitBtn = document.getElementById("submitBtn");
      const studentList = document.getElementById("studentList");

      let isEditMode = false;
      let currentStudentItem = null;
      let currentFatherItem = null;
      let isItemList = true;

      submitBtn.addEventListener("click", handleSubmit);

      function handleSubmit() {
        
        let studentValue = studentInput.value.trim();
        let fatherValue = fatherInput.value.trim();

        let hasEmptyField = !studentValue || !fatherValue;
        if (hasEmptyField) {
          alert("input fields cannot be empty");
          return;
        }

        const regex = /^[A-Za-z ]+$/;
        if (!regex.test(studentValue) || !regex.test(fatherValue)) {
          alert("only english letters are allowed.");
          return;
        }

        if (isEditMode) {
          updateRecord(studentValue, fatherValue);
        } else {
          createRecord(studentValue, fatherValue);
        }

        

        clearInputs();
      }

      function createRecord(studentValue, fatherValue) {
        
        

        let studentItem = document.createElement("li");
        let std_head = document.createElement("h2");
        std_head.textContent = "Student";
        let father_head = document.createElement("h2");
        father_head.textContent = "Father";
        let editBtn = document.createElement("button");
        editBtn.textContent = "Edit";
        editBtn.className = "edit_btn";
        let deleteBtn = document.createElement("button");
        deleteBtn.textContent = "delete";
        deleteBtn.className = "del_btn";
        let student_name = document.createElement("p");
        student_name.textContent = studentValue;
        let father_name = document.createElement("p");
        father_name.textContent = fatherValue;
        let container = document.createElement("div");
        container.className = "container";

        if(isItemList == true){
        studentItem.appendChild(std_head);
        studentItem.appendChild(father_head);
}

          isItemList = false;
        let lineBreak = document.createElement("br");

        editBtn.addEventListener("click", () => {
          enableEditMode(student_name,father_name);
        });

        deleteBtn.addEventListener("click", () => {
          deleteRecord(container,student_name);
        });

        studentList.appendChild(studentItem);  
         container.appendChild(student_name);
        container.appendChild(father_name);      
        container.appendChild(editBtn);
        container.appendChild(deleteBtn);
       
        studentList.appendChild(container);
        
      }

      function enableEditMode(student_name,father_name) {
        isEditMode = true;
        currentStudentItem = student_name;
        currentFatherItem = father_name;
        studentInput.value = student_name.textContent;
        fatherInput.value = father_name.textContent;
        submitBtn.textContent = "save changes";
      }

      function updateRecord(studentValue, fatherValue) {
        currentStudentItem.textContent = studentValue;
        
        resetEditMode();
      }

      function resetEditMode() {
        isEditMode = false;
        currentStudentItem = null;
        submitBtn.textContent = "Add";
        clearInputs();
      }

      function clearInputs() {
        studentInput.value = "";
        fatherInput.value = "";
      }

      function deleteRecord(container,student_name
      ) {
        const confirmed = window.confirm(
          "Are you sure you want to delete this?",
        );
        if (confirmed) {
          const isDeletingSameItem = isEditMode && student_name == currentStudentItem;
          if (isDeletingSameItem) {
            resetEditMode();
          }

          studentList.removeChild(container);
        } else {
          console.log("deletion cancelled");
        }
      }
    </script>
  </body>
</html>
